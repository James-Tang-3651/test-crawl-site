# Reverse proxy: public :80 -> uvicorn 127.0.0.1:9000
# Put this in /etc/nginx/conf.d/crawl-test-site.conf (Amazon Linux)
# or /etc/nginx/sites-available/ + symlink (Ubuntu).
# For HTTPS, run certbot (see DEPLOY.md) which rewrites this server block.

server {
    listen 80;
    listen [::]:80;
    server_name _;  # replace with your domain, e.g. crawl-test.example.com

    # Keep the largest asset (the ~637KB gif) comfortably under the limit.
    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
